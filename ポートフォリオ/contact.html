<body>
    <div class="contact-wrapper">
        <header>
            <div class="header">
                <div class="header__logo">
                    <h1><a href="index.html">Keita`s Portfolio</a></h1>
                </div>
                <div class="header__hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <nav class="header__menu">
                    <ul>
                        <li><a href="index.html"><img class="menu-img" src="images/home-s.png" alt="Home"></a></li>
                        <li><a href="service.html">Service</a></li>
                        <li><a href="contact.html">Contact</a></li>
                    </ul>

                </nav>
            </div>
        </header>
        <main>
            <section class="contact">
                <div class="container">
                    <div class="heading">
                        <h2>Contact</h2>
                    </div>
                    <div class="contact__message">
                        <p>お問い合わせはこちらのフォーム、またはSNSのダイレクトメッセージからお気軽にご連絡ください。</p>
                    </div>
                    <form action="https://formspree.io/f/xgonnjpw" method="post" class="contact__form">
                        <div class="contact__group">
                            <label for="name">お名前</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="contact__group">
                            <label for="email">メールアドレス</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="contact__group">
                            <label for="message">お問い合わせ内容</label>
                            <textarea id="message" name="message" rows="6" required></textarea>
                        </div>
                        <button type="submit">送信する</button>
                    </form>
                    </form>
                </div>
            </section>

        </main>
    </div>
    <footer class="footer">
        <div class="footer__menu">
            <div class="footer__logo">
                <a href="index.html">Keita`s Portfolio</a>
            </div>
